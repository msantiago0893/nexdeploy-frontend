name: CI/CD - Angular NexDeploy

run-name: >
  ${{ github.event_name }} |
  ${{ github.ref_name }} |
  @${{ github.actor }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  PROJECT_NAME: nexdeploy
  BUILD_PATH: dist/nexdeploy/browser

jobs:

  build:
    name: Build, Lint and Package
    runs-on: ubuntu-latest

    outputs:
      artifact-name: angular-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Ensure SPA routing (_redirects)
        run: |
          echo "/*    /index.html   200" > $BUILD_PATH/_redirects

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: ${{ env.BUILD_PATH }}

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    environment:
      name: production
      url: https://nexdeploy.pages.dev

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: ./build

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy ./build \
            --project-name=${{ env.PROJECT_NAME }} \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}